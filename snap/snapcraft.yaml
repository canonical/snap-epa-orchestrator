name: epa-orchestrator
base: core26
build-base: devel
version: "2026.1"
license: Apache-2.0
summary: NUMA-aware CPU and hugepage resource orchestrator for snaps
source-code:
  - https://github.com/canonical/snap-epa-orchestrator
issues:
  - https://bugs.launchpad.net/snap-epa-orchestrator

description: |
  EPA Orchestrator provides policy-driven, NUMA-aware allocation of CPU cores
  and hugepages for snaps and workloads on Linux systems. It exposes a JSON API
  over a local Unix socket, enabling other snaps (such as openstack-hypervisor)
  to request and manage dedicated resources in a controlled manner.

  Key capabilities:
    - Dedicated and shared CPU pinning with per-service tracking
    - NUMA-aware core allocation with SMT/hyperthreading awareness
    - Hugepage introspection and per-service allocation tracking across NUMA nodes
    - Automatic allocation heuristics based on system size
    - Persistent state with atomic writes and file locking
    - Secure local-only Unix socket API with versioned JSON protocol

grade: devel
confinement: strict

apps:
  daemon:
    command: "bin/daemon"
    daemon: simple
    environment:
      # uv installs packages into lib/python3.14/site-packages; add to
      # PYTHONPATH so that #!/usr/bin/env python3 finds them at runtime.
      PYTHONPATH: $SNAP/lib/python3.14/site-packages
    plugs:
      - network-bind
      - sys-devices-system-node
    slots:
      - epa-info

  daily-backup:
    command: usr/sbin/logrotate -s $SNAP_DATA/logrotate.status $SNAP/etc/logrotate.d/state-json
    daemon: oneshot
    timer: 00:00

parts:
  bin:
    source: bin/
    plugin: dump
    organize:
      "*": bin/

  epa-orchestrator:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - libffi-dev
    build-environment:
      - PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    stage-packages:
      - python3-venv
    override-prime: |
      craftctl default
      # Remove dangling venv symlinks pointing into the build directory.
      rm -f $CRAFT_PRIME/bin/python
      rm -f $CRAFT_PRIME/bin/python3.14

  logrotate:
    plugin: nil
    stage-packages:
      - logrotate

  logrotate-conf:
    plugin: dump
    source: snap/local/logrotate.conf
    source-type: file
    organize:
      logrotate.conf: etc/logrotate.d/state-json
    override-prime: |
      craftctl default
      chmod 0644 "$SNAPCRAFT_PRIME/etc/logrotate.d/state-json"

slots:
  epa-info:
    interface: content
    content: epa-info
    source:
      write:
        - $SNAP_DATA/data

plugs:
  sys-devices-system-node:
    interface: system-files
    read:
      - /sys/devices/system/node
