name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run lint
        run: tox -e lint

  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run format
        run: tox -e fmt

  unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run unit tests
        run: tox -e unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run integration tests
        run: tox -e integration

  mypy:
    name: Type Checking (mypy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run mypy type checks
        run: tox -e mypy

  build-snap:
    name: Build EPA Orchestrator Snap
    runs-on: ubuntu-24.04
    outputs:
      snap-file: ${{ steps.snapcraft.outputs.snap }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@v1
      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snaps
          path: ${{ steps.snapcraft.outputs.snap }}
          retention-days: 1

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-24.04
    needs: build-snap
    steps:
      - name: Download snap
        uses: actions/download-artifact@v4
        with:
          name: snaps
          path: /home/runner
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy utils
        run: cp tests/scripts/actionutils.sh $HOME
      - name: Clear FORWARD firewall rules
        run: ~/actionutils.sh cleaript
      - name: Free disk
        run: ~/actionutils.sh free_runner_disk
      - name: Install snap
        run: ~/actionutils.sh install_snap
      - name: Verify snap installation
        run: |
          sudo snap list | grep epa-orchestrator
          sudo snap services epa-orchestrator
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest==8.4.1 pytest-mock==3.14.1 pytest-cov==6.2.1
      - name: Verify pytest installation
        run: |
          python3 -m pytest --version
          python3 -m pip show pytest-mock
          python3 -m pip show pytest-cov
      - name: Set test isolated CPUs for snap
        run: |
          sudo snap set epa-orchestrator environment.test-isolated-cpus="0-3"
          sudo systemctl restart snap.epa-orchestrator.daemon.service
      - name: Run functional tests
        env:
          SOCKET_PATH: /var/snap/epa-orchestrator/current/data/epa.sock
        run: |
          # Wait for socket to be available
          timeout=30
          for i in $(seq 1 $timeout); do
            if [ -S "$SOCKET_PATH" ]; then
              break
            fi
            echo "Waiting for socket to be created... ($i/$timeout)"
            sleep 1
          done
          if ! [ -S "$SOCKET_PATH" ]; then
            echo "ERROR: Socket not created after $timeout seconds"
            exit 1
          fi
          # Run pytest functional tests with verbose output
          echo "Running functional tests..."
          cd tests/functional && python3 -m pytest . -v --tb=short --import-mode=importlib --confcutdir=. || {
            echo "Functional tests failed. Checking socket status..."
            ls -la "$SOCKET_PATH" || echo "Socket not found"
            exit 1
          }
      - name: Print logs for failure
        if: failure()
        run: ~/actionutils.sh print_logs
