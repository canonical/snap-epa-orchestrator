name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run lint
        run: tox -e lint

  fmt:
    name: Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run format
        run: tox -e fmt

  unit:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run unit tests
        run: tox -e unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run integration tests
        run: tox -e integration

  mypy:
    name: Type Checking (mypy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install tox
      - name: Run mypy type checks
        run: tox -e mypy

  build-snap:
    name: Build EPA Orchestrator Snap
    runs-on: ubuntu-22.04
    outputs:
      snap-file: ${{ steps.snapcraft.outputs.snap }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@v1
      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snaps
          path: ${{ steps.snapcraft.outputs.snap }}
          retention-days: 1

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-22.04
    needs: build-snap
    steps:
      - name: Download snap
        uses: actions/download-artifact@v4
        with:
          name: snaps
          path: /home/runner
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy utils
        run: cp tests/scripts/actionutils.sh $HOME
      - name: Clear FORWARD firewall rules
        run: ~/actionutils.sh cleaript
      - name: Free disk
        run: ~/actionutils.sh free_runner_disk
      - name: Install snap
        run: ~/actionutils.sh install_snap
      - name: Test socket API
        run: ~/actionutils.sh test_socket_api
      - name: Print logs for failure
        if: failure()
        run: ~/actionutils.sh print_logs
